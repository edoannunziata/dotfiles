setw -g mode-keys vi

set -g base-index 1

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour brightcyan

set -g status on
set -g status-position top
set -g status-fg default
set -g status-interval 1
set -g status-justify left
set -g status-keys vi
set -g status-style fg=default

set -g status-left ""
set -g status-left-length 20
set -g status-left-style default

set -g status-right '#(date +"%H:%M")'
set -g status-right-length 140
set -g status-right-style default,bold

# copy mode
setw -g mode-style 'fg=black bg=brightcyan bold'

# panes
set -g pane-border-style 'fg=default'
set -g pane-active-border-style 'fg=brightcyan'

setw -g window-status-current-style 'fg=brightcyan bg=default'
setw -g window-status-current-format ' #[fg=brightcyan bold]#I #[fg=brightcyan none]#W #[fg=brightcyan none]#F '

setw -g window-status-style 'fg=default'
setw -g window-status-format ' #[fg=default bold]#I #[fg=default none]#W #[fg=default none]#F '

setw -g window-status-bell-style 'fg=orange bold'

# messages
set -g message-style 'fg=brightcyan bg=default bold'
